<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register User - Panache WMS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

.card{
width:450px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h2{
margin-bottom:10px;
}

p{
color:gray;
margin-bottom:25px;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.back-link{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#2563eb;
font-weight:600;
}

</style>

</head>

<body>

<div class="card">

<h2>Create User</h2>

<p>Add a new employee account</p>

<input
type="text"
id="username"
placeholder="Username"
required

>

<input
type="email"
id="email"
placeholder="Email"
required

>

<input
type="password"
id="password"
placeholder="Password"
required

>

<select id="role">

<option value="employee">
Employee
</option>

<option value="manager">
Manager
</option>

<option value="admin">
Admin
</option>

</select>

<button onclick="registerUser()">
Create User
</button>

<a href="index.html" class="back-link">
← Back to Login
</a>

</div>

<script>

async function registerUser(){

    const username =
    document.getElementById("username").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const role =
    document.getElementById("role").value;

    try {

        const response = await fetch(
        `http://127.0.0.1:8000/register?username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=${role}`,
        {
            method:"POST"
        });

        const data = await response.json();

        if(data.success){

            alert("User created successfully");

            window.location.href =
            "index.html";

        }else{

            alert(data.message);

        }

    }catch(error){

        console.error(error);

        alert(
            "Cannot connect to server"
        );

    }

}

</script>

</body>
</html>
