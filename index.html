<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panache Workforce Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

.container{
width:1000px;
height:600px;
background:white;
border-radius:20px;
overflow:hidden;
display:flex;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.left{
flex:1;
background:#111827;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:42px;
margin-bottom:20px;
}

.left p{
line-height:1.8;
color:#d1d5db;
}

.features{
margin-top:25px;
}

.features div{
margin-bottom:12px;
}

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.login-box{
width:100%;
max-width:400px;
}

.login-box h2{
margin-bottom:10px;
}

.login-box p{
margin-bottom:25px;
color:gray;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.demo{
margin-top:20px;
padding:15px;
background:#f3f4f6;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="logo-container">

<img
src="panachedigilife_logo.jpg"
class="logo"
alt="Panache DigiLife">

</div>

<h1>Smart Workforce Platform</h1>



</div>

<div class="right">

<div class="right">

<div class="login-box">

<h2>Login</h2>

<p>Access your workspace</p>

<form onsubmit="login(event)">

<input
id="email"
type="email"
placeholder="Email"
required
>

<input
id="password"
type="password"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

    <a
href="register.html"
style="
display:block;
text-align:center;
margin-top:15px;
color:#2563eb;
font-weight:600;
text-decoration:none;
">
Register New User
</a>
    
</form>

</div>

</div>

</div>



<script>

async function login(event){

    event.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try {

        const response = await fetch(
`https://backend-production-53f3.up.railway.app/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`,
{
    method:"POST"
});

        const data = await response.json();
        console.log(data);

        if(data.success){

            localStorage.setItem("userId", data.id);
            localStorage.setItem("userName", data.name);
            localStorage.setItem("userEmail", data.email);
            localStorage.setItem("userRole", data.role);


            if(data.role === "admin"){
                window.location.href = "admin-dashboard.html";
            }
            else if(data.role === "manager"){
                window.location.href = "manager-dashboard.html";
            }
            else{
                window.location.href = "employee-dashboard.html";
            }

        } else {

            alert("Invalid email or password");

        }

    } catch(error){

        console.error(error);
        alert("Cannot connect to server");

    }

}

</script>

</body>
</html>
