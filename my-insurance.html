<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Insurance | Panache WMS</title>
    <script>
        const role = localStorage.getItem("userRole");
        if (!role) { window.location.href = "index.html"; }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { display:flex; background:#f4f6f9; }

        .sidebar { width:260px; height:100vh; background:#111827; color:white; position:fixed; padding:20px; display:flex; flex-direction:column; overflow-y:auto; }
        .logo { font-size:22px; font-weight:bold; margin-bottom:30px; }
        .menu a { display:block; color:white; text-decoration:none; padding:12px; margin-bottom:8px; border-radius:8px; transition:.3s; font-size:14px; }
        .menu a:hover, .menu a.active { background:#2563eb; }
        .menu-group { margin-bottom:6px; }
        .menu-group-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; cursor:pointer; border-radius:8px; color:rgba(255,255,255,0.55); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; user-select:none; }
        .menu-group-header:hover { background:rgba(255,255,255,0.06); }
        .menu-group-header .chev { transition:transform .2s; font-size:10px; }
        .menu-group.open .menu-group-header .chev { transform:rotate(90deg); }
        .menu-group-items { display:none; padding-left:2px; }
        .menu-group.open .menu-group-items { display:block; }
        .menu-group-items a { padding:10px 12px; font-size:13.5px; }

        .main { margin-left:260px; width:100%; padding:25px; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
        .header h1 { color:#111827; }
        .profile { background:white; padding:10px 20px; border-radius:10px; font-weight:bold; }
        .logout-btn { background:#dc2626; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; }
        .logout-btn:hover { background:#b91c1c; }

        .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:20px; margin-bottom:25px; }
        .card { background:white; padding:20px; border-radius:15px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
        .card h2 { color:#2563eb; font-size:28px; margin-bottom:6px; }
        .card p { color:#6b7280; font-size:13px; }
        .card.yellow h2 { color:#f59e0b; }
        .card.green h2 { color:#16a34a; }

        .section { background:white; padding:22px; border-radius:15px; margin-bottom:25px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
        .section h2 { color:#111827; margin-bottom:16px; }

        .policy-card { border:1px solid #eee; border-radius:12px; padding:16px 18px; margin-bottom:14px; }
        .policy-card:last-child { margin-bottom:0; }
        .policy-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
        .policy-top .name { font-weight:700; color:#111827; font-size:15px; }
        .policy-sub { color:#6b7280; font-size:12.5px; margin-top:2px; }
        .policy-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px 16px; font-size:13px; }
        .policy-grid div span { display:block; color:#9ca3af; font-size:11px; text-transform:uppercase; letter-spacing:.3px; margin-bottom:2px; }
        .policy-grid div b { color:#111827; }

        .badge { display:inline-block; padding:3px 10px; border-radius:99px; font-size:11.5px; font-weight:600; white-space:nowrap; }
        .badge-green { background:#dcfce7; color:#15803d; }
        .badge-yellow { background:#fef9c3; color:#a16207; }
        .badge-orange { background:#ffedd5; color:#c2410c; }
        .badge-red { background:#fee2e2; color:#b91c1c; }
        .badge-gray { background:#f3f4f6; color:#6b7280; }

        .doc-link { font-size:12.5px; color:#2563eb; text-decoration:none; font-weight:600; }
        .no-data { text-align:center; padding:30px; color:#9ca3af; font-size:14px; }

        @media(max-width:1000px) { .sidebar { width:200px; } .main { margin-left:200px; } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">
    <div class="header">
        <h1>My Insurance</h1>
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="profile" id="profileName">—</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="cards">
        <div class="card"><h2 id="statActive">—</h2><p>Active Policies</p></div>
        <div class="card yellow"><h2 id="statExpiring">—</h2><p>Renewing Within 30 Days</p></div>
        <div class="card green"><h2 id="statBonus">—</h2><p>Bonus Currently Held</p></div>
    </div>

    <div class="section">
        <h2>My Policies</h2>
        <div id="policyList"></div>
        <div class="no-data" id="noData" style="display:none;">No insurance policies are on file for you yet. Reach out to HR if you think this is missing.</div>
    </div>
</div>

<script>
const BASE = "https://backend-production-53f3.up.railway.app";
const myRole = localStorage.getItem("userRole") || "employee";
const myId = localStorage.getItem("userId");

document.getElementById("profileName").innerHTML = localStorage.getItem("userName") || "Employee";
function logout() { localStorage.clear(); window.location.href = "index.html"; }
function fmtDate(raw) {
    if (!raw) return "—";
    const d = new Date(raw);
    return isNaN(d) ? raw : d.toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" });
}
function fmtMoney(n) {
    if (n === null || n === undefined) return "—";
    return "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 0 });
}

function renderSidebar() {
    const groups = [
        { top: true, links: [["employee-dashboard.html","Dashboard"]] },
        { name:"My Records", links: [["history.html","History"],["attendance.html","Attendance Manager"],["my-insurance.html","My Insurance"]] },
        { name:"Company", links: [["employee-hub.html","Employee Hub"],["letterhead.html","Letter Head Manager"]] },
        { name:"Planning", links: [["calendar.html","Calendar"],["reminder.html","Reminders"]] },
        { name:"Sales", links: [["sales-dashboard.html","Sales Dashboard"]] },
        { top: true, links: [["settings.html","Settings"]] },
    ];
    let openState = {};
    try { openState = JSON.parse(localStorage.getItem("sidebarGroupState")) || {}; } catch(e) {}
    const current = "my-insurance.html";
    let html = `<div class="logo">Panache</div><div class="menu">`;
    groups.forEach(g => {
        if (g.top) {
            g.links.forEach(([href,label]) => { html += `<a href="${href}" class="${href===current?'active':''}">${label}</a>`; });
        } else {
            const isOpen = openState[g.name] ?? g.links.some(([href]) => href === current);
            html += `<div class="menu-group ${isOpen?'open':''}" data-group="${g.name}">
                        <div class="menu-group-header" onclick="toggleGroup('${g.name}')">${g.name}<span class="chev">▶</span></div>
                        <div class="menu-group-items">`;
            g.links.forEach(([href,label]) => { html += `<a href="${href}" class="${href===current?'active':''}">${label}</a>`; });
            html += `</div></div>`;
        }
    });
    html += `</div>`;
    document.getElementById("sidebar").innerHTML = html;
}
function toggleGroup(name) {
    let state = {};
    try { state = JSON.parse(localStorage.getItem("sidebarGroupState")) || {}; } catch(e) {}
    const el = document.querySelector(`.menu-group[data-group="${name}"]`);
    const nowOpen = !el.classList.contains("open");
    el.classList.toggle("open");
    state[name] = nowOpen;
    localStorage.setItem("sidebarGroupState", JSON.stringify(state));
}
renderSidebar();

function statusBadge(p) {
    const days = p.days_to_expiry;
    if (p.status === "Renewed") return `<span class="badge badge-gray">Renewed</span>`;
    if (days === null || days === undefined) return `<span class="badge badge-gray">${p.status}</span>`;
    if (days < 0) return `<span class="badge badge-red">Expired</span>`;
    if (days <= 7) return `<span class="badge badge-red">Renews in ${days}d</span>`;
    if (days <= 30) return `<span class="badge badge-orange">Renews in ${days}d</span>`;
    if (days <= 60) return `<span class="badge badge-yellow">Renews in ${days}d</span>`;
    return `<span class="badge badge-green">Active</span>`;
}

async function loadMyPolicies() {
    try {
        const res = await fetch(`${BASE}/insurance/policies?role=employee&user_id=${myId}`);
        const policies = await res.json();
        const listEl = document.getElementById("policyList");
        const noData = document.getElementById("noData");

        if (!policies.length) { noData.style.display = "block"; listEl.innerHTML = ""; }
        else {
            noData.style.display = "none";
            let expiring30 = 0, totalBonus = 0;
            listEl.innerHTML = policies.map(p => {
                if (p.days_to_expiry !== null && p.days_to_expiry <= 30 && p.days_to_expiry >= 0) expiring30++;
                totalBonus += (p.cumulative_bonus_percent || 0);
                return `
                <div class="policy-card">
                    <div class="policy-top">
                        <div><div class="name">${p.policy_type} — ${p.insurer_name}</div>
                        <div class="policy-sub">Policy #${p.policy_number}</div></div>
                        ${statusBadge(p)}
                    </div>
                    <div class="policy-grid">
                        <div><span>Coverage</span><b>${fmtMoney(p.sum_insured)}</b></div>
                        <div><span>Premium</span><b>${fmtMoney(p.premium_amount)} / ${p.premium_frequency || 'yr'}</b></div>
                        <div><span>Expiry</span><b>${fmtDate(p.expiry_date)}</b></div>
                        <div><span>No-Claim Bonus</span><b>${p.cumulative_bonus_percent || 0}%</b></div>
                        ${p.nominee_name ? `<div><span>Nominee</span><b>${p.nominee_name}${p.nominee_relation ? ' ('+p.nominee_relation+')' : ''}</b></div>` : ""}
                        ${p.vehicle_reg_no ? `<div><span>Vehicle</span><b>${p.vehicle_reg_no}</b></div>` : ""}
                    </div>
                    ${p.file_url ? `<div style="margin-top:10px;"><a class="doc-link" href="${BASE}${p.file_url}" target="_blank">View policy document →</a></div>` : ""}
                </div>`;
            }).join("");
            document.getElementById("statActive").textContent = policies.filter(p => p.status === "Active").length;
            document.getElementById("statExpiring").textContent = expiring30;
            document.getElementById("statBonus").textContent = totalBonus.toFixed(0) + "%";
        }
    } catch (e) { console.error(e); }
}

loadMyPolicies();
</script>
</body>
</html>
