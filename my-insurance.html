<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14161B">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Insurance | Panache WMS</title>
    <script>
        const role = localStorage.getItem("userRole");
        if (!role) { window.location.href = "index.html"; }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,380..700;1,9..144,400..600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="panache-theme.css">

    <style>
        body { display:flex; }
        .main { margin-left:264px; width:calc(100% - 264px); padding: 28px 34px 50px; }

        .card.yellow h2 { color: var(--warning); }
        .card.green h2 { color: var(--success); }

        .policy-card { border:1px solid var(--border-soft); border-radius: var(--radius-md); padding:18px 20px; margin-bottom:14px; background: var(--surface-muted); }
        .policy-card:last-child { margin-bottom:0; }
        .policy-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
        .policy-top .name { font-family: var(--font-display); font-weight:600; color: var(--text); font-size:16px; }
        .policy-sub { color: var(--text-muted); font-size:12.5px; margin-top:2px; }
        .policy-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px 18px; font-size:13px; }
        .policy-grid div span { display:block; color: var(--text-faint); font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; font-weight:700; }
        .policy-grid div b { color: var(--text); }

        .doc-link { font-size:12.5px; color: var(--brass-dark); text-decoration:none; font-weight:700; }
        .doc-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleMobileSidebar()" aria-label="Open menu">☰</button>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleMobileSidebar()"></div>

<div class="sidebar" id="sidebar"></div>

<div class="main">
    <div class="header">
        <h1>My Insurance</h1>
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="profile" id="profileName">—</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="cards">
        <div class="card"><h2 id="statActive">—</h2><p>Active Policies</p></div>
        <div class="card yellow"><h2 id="statExpiring">—</h2><p>Renewing Within 30 Days</p></div>
        <div class="card green"><h2 id="statBonus">—</h2><p>Bonus Currently Held</p></div>
    </div>

    <div class="section">
        <h2>My Policies</h2>
        <div id="policyList"></div>
        <div class="no-data" id="noData" style="display:none;">No insurance policies are on file for you yet. Reach out to HR if you think this is missing.</div>
    </div>
</div>

<script>
window.toggleMobileSidebar = function() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebarBackdrop").classList.toggle("active");
};

const BASE = "https://backend-n5lk.onrender.com";
const myRole = localStorage.getItem("userRole") || "employee";
const myId = localStorage.getItem("userId");

document.getElementById("profileName").innerHTML = localStorage.getItem("userName") || "Employee";
function logout() { localStorage.clear(); window.location.href = "index.html"; }
function fmtDate(raw) {
    if (!raw) return "—";
    const d = new Date(raw);
    return isNaN(d) ? raw : d.toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" });
}
function fmtMoney(n) {
    if (n === null || n === undefined) return "—";
    return "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 0 });
}

function renderSidebar() {
    const groups = [
        { top: true, links: [["employee-dashboard.html","Dashboard"]] },
        { name:"My Records", links: [["history.html","History"],["attendance.html","Attendance Manager"],["my-insurance.html","My Insurance"]] },
        { name:"Company", links: [["employee-hub.html","Employee Hub"],["letterhead.html","Letter Head Manager"]] },
        { name:"Planning", links: [["calendar.html","Calendar"],["reminder.html","Reminders"]] },
        { name:"Sales", links: [["sales-dashboard.html","Sales Dashboard"]] },
        { top: true, links: [["settings.html","Settings"]] },
    ];
    let openState = {};
    try { openState = JSON.parse(localStorage.getItem("sidebarGroupState")) || {}; } catch(e) {}
    const current = "my-insurance.html";
    let html = `<div class="logo">✦ Panache</div><div class="menu">`;
    groups.forEach(g => {
        if (g.top) {
            g.links.forEach(([href,label]) => { html += `<a href="${href}" class="${href===current?'active':''}">${label}</a>`; });
        } else {
            const isOpen = openState[g.name] ?? g.links.some(([href]) => href === current);
            html += `<div class="menu-group ${isOpen?'open':''}" data-group="${g.name}">
                        <div class="menu-group-header" onclick="toggleGroup('${g.name}')">${g.name}<span class="chev">▶</span></div>
                        <div class="menu-group-items">`;
            g.links.forEach(([href,label]) => { html += `<a href="${href}" class="${href===current?'active':''}">${label}</a>`; });
            html += `</div></div>`;
        }
    });
    html += `</div>`;
    document.getElementById("sidebar").innerHTML = html;
}
function toggleGroup(name) {
    let state = {};
    try { state = JSON.parse(localStorage.getItem("sidebarGroupState")) || {}; } catch(e) {}
    const el = document.querySelector(`.menu-group[data-group="${name}"]`);
    const nowOpen = !el.classList.contains("open");
    el.classList.toggle("open");
    state[name] = nowOpen;
    localStorage.setItem("sidebarGroupState", JSON.stringify(state));
}
renderSidebar();

function statusBadge(p) {
    const days = p.days_to_expiry;
    if (p.status === "Renewed") return `<span class="badge badge-gray">Renewed</span>`;
    if (days === null || days === undefined) return `<span class="badge badge-gray">${p.status}</span>`;
    if (days < 0) return `<span class="badge badge-red">Expired</span>`;
    if (days <= 7) return `<span class="badge badge-red">Renews in ${days}d</span>`;
    if (days <= 30) return `<span class="badge badge-orange">Renews in ${days}d</span>`;
    if (days <= 60) return `<span class="badge badge-yellow">Renews in ${days}d</span>`;
    return `<span class="badge badge-green">Active</span>`;
}

async function loadMyPolicies() {
    try {
        const res = await fetch(`${BASE}/insurance/policies?role=employee&user_id=${myId}`);
        const policies = await res.json();
        const listEl = document.getElementById("policyList");
        const noData = document.getElementById("noData");

        if (!policies.length) { noData.style.display = "block"; listEl.innerHTML = ""; }
        else {
            noData.style.display = "none";
            let expiring30 = 0, totalBonus = 0;
            listEl.innerHTML = policies.map(p => {
                if (p.days_to_expiry !== null && p.days_to_expiry <= 30 && p.days_to_expiry >= 0) expiring30++;
                totalBonus += (p.cumulative_bonus_percent || 0);
                return `
                <div class="policy-card">
                    <div class="policy-top">
                        <div><div class="name">${p.policy_type} — ${p.insurer_name}</div>
                        <div class="policy-sub">Policy #${p.policy_number}</div></div>
                        ${statusBadge(p)}
                    </div>
                    <div class="policy-grid">
                        <div><span>Coverage</span><b>${fmtMoney(p.sum_insured)}</b></div>
                        <div><span>Premium</span><b>${fmtMoney(p.premium_amount)} / ${p.premium_frequency || 'yr'}</b></div>
                        <div><span>Expiry</span><b>${fmtDate(p.expiry_date)}</b></div>
                        <div><span>No-Claim Bonus</span><b>${p.cumulative_bonus_percent || 0}%</b></div>
                        ${p.nominee_name ? `<div><span>Nominee</span><b>${p.nominee_name}${p.nominee_relation ? ' ('+p.nominee_relation+')' : ''}</b></div>` : ""}
                        ${p.vehicle_reg_no ? `<div><span>Vehicle</span><b>${p.vehicle_reg_no}</b></div>` : ""}
                    </div>
                    ${p.file_url ? `<div style="margin-top:10px;"><a class="doc-link" href="${BASE}${p.file_url}" target="_blank">View policy document →</a></div>` : ""}
                </div>`;
            }).join("");
            document.getElementById("statActive").textContent = policies.filter(p => p.status === "Active").length;
            document.getElementById("statExpiring").textContent = expiring30;
            document.getElementById("statBonus").textContent = totalBonus.toFixed(0) + "%";
        }
    } catch (e) { console.error(e); }
}

loadMyPolicies();
</script>
</body>
</html>
