<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task | Panache</title>
    <script>
        const role = localStorage.getItem("userRole");
        if (!role) { window.location.href = "index.html"; }
        if (role !== "manager" && role !== "admin") { window.location.href = "index.html"; }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #2563eb;
        }

        .menu details summary {
            color: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            list-style: none;
        }

        .menu details summary:hover {
            background: #2563eb;
        }

        .menu details a {
            padding-left: 24px;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            width: 100%;
            padding: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 { color: #111827; }

        .profile {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn:hover { background: #b91c1c; }

        /* FORM CARD */
        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            max-width: 750px;
        }

        .section h2 {
            margin-bottom: 25px;
            color: #111827;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
            color: #111827;
            background: #fff;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* EMPLOYEE SEARCHABLE COMBOBOX */
        .employee-select {
            position: relative;
        }

        .employee-input-shell {
            position: relative;
            display: flex;
            align-items: center;
        }

        .employee-search-icon {
            position: absolute;
            left: 13px;
            width: 16px;
            height: 16px;
            color: #9ca3af;
            pointer-events: none;
        }

        .employee-input-shell input#employeeSearch {
            padding-left: 38px;
        }

        .employee-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            max-height: 240px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(17,24,39,.12);
            z-index: 20;
            padding: 6px;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity .15s ease, transform .15s ease;
        }

        .employee-dropdown.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .employee-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            font-size: 14px;
            color: #111827;
            border-radius: 8px;
            cursor: pointer;
            transition: background .12s ease;
        }

        .employee-option:hover,
        .employee-option.active {
            background: #eef4ff;
        }

        .employee-option .option-avatar {
            flex-shrink: 0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #2563eb;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .employee-option .option-id {
            margin-left: auto;
            font-size: 12px;
            color: #9ca3af;
        }

        .employee-option.empty {
            color: #9ca3af;
            cursor: default;
            justify-content: center;
            padding: 16px 10px;
        }

        .employee-option.empty:hover {
            background: none;
        }

        /* SELECTED EMPLOYEE CHIP */
        .employee-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #eef4ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 8px 10px;
        }

        .employee-chip .chip-avatar {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #2563eb;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .employee-chip .chip-name {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            flex: 1;
        }

        .employee-chip .chip-remove {
            background: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            cursor: pointer;
            transition: background .12s ease, color .12s ease;
        }

        .employee-chip .chip-remove svg {
            width: 14px;
            height: 14px;
        }

        .employee-chip .chip-remove:hover {
            background: #dbeafe;
            color: #1d4ed8;
        }

        /* BUTTONS */
        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 13px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
        }

        .submit-btn:hover { background: #1d4ed8; }

        .cancel-btn {
            background: #e5e7eb;
            color: #374151;
            padding: 13px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-right: 12px;
        }

        .cancel-btn:hover { background: #d1d5db; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #111827;
            color: white;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .main { margin-left: 200px; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Panache WMS</div>
    <div class="menu">
        <a href="manager-dashboard.html">Dashboard</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>Create New Task</h1>
        <div style="display:flex;align-items:center;gap:15px;">
            <div class="profile">
                <b id="profileName">Loading...</b><br>
                <span id="profileEmail"></span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- FORM -->
    <div class="section">
        <h2>Task Details</h2>

        <div class="form-group">
            <label>Task Title</label>
            <input type="text" id="taskTitle" placeholder="Enter task title">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="taskDescription" placeholder="Describe the task..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Assign To</label>
                <div class="employee-select" id="employeeSelectWrapper">

                    <div class="employee-input-shell" id="employeeInputShell">
                        <svg class="employee-search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                            <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input type="text" id="employeeSearch" placeholder="Search employee by name..." autocomplete="off">
                    </div>

                    <div class="employee-chip" id="employeeChip" style="display:none;">
                        <span class="chip-avatar" id="chipAvatar"></span>
                        <span class="chip-name" id="chipName"></span>
                        <button type="button" class="chip-remove" id="chipRemove" aria-label="Remove selection">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>

                    <input type="hidden" id="taskAssignedTo">
                    <div class="employee-dropdown" id="employeeDropdown"></div>
                </div>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="taskDueDate">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="taskStatus">
                    <option value="Assigned">Assigned</option>
                    <option value="In Progress">In Progress</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 25px;">
            <button class="cancel-btn" onclick="window.location.href='manager-dashboard.html'">
                Cancel
            </button>
            <button class="submit-btn" onclick="createTask()">
                Create Task
            </button>
        </div>
    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    const BASE = "https://backend-n5lk.onrender.com";

    document.getElementById("profileName").innerHTML  = localStorage.getItem("userName");
    document.getElementById("profileEmail").innerHTML = localStorage.getItem("userEmail");

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }

    // ── LOAD EMPLOYEES INTO DROPDOWN ─────────────────────────
    // Admins can assign to anyone in the org; managers only see their own team.
    let allEmployees = []; // cached full list, used for client-side search filtering

    async function loadEmployees() {
        const userId = localStorage.getItem("userId");
        const role   = localStorage.getItem("userRole");
        if (!userId) { showToast("Session expired. Please log in again."); return; }

        const isAdmin = role === "admin";
        const url     = isAdmin ? `${BASE}/employees` : `${BASE}/team?manager_id=${userId}`;

        try {
            const res     = await fetch(url);
            const members = await res.json();

            if (!Array.isArray(members) || members.length === 0) {
                document.getElementById("employeeSearch").placeholder = "No employees found";
                showToast(isAdmin ? "No employees found in the org." : "No team members assigned to you yet.");
                return;
            }

            // Normalize field names (/employees uses full_name, /team also uses full_name)
            allEmployees = members
                .map(emp => ({ id: emp.id, full_name: emp.full_name }))
                .sort((a, b) => a.full_name.localeCompare(b.full_name));

        } catch (e) {
            console.error("loadEmployees error:", e);
            showToast("Could not load employees. Please refresh.");
        }
    }

    // ── EMPLOYEE SEARCHABLE COMBOBOX ─────────────────────────
    const employeeSearchInput = document.getElementById("employeeSearch");
    const employeeInputShell  = document.getElementById("employeeInputShell");
    const employeeDropdown    = document.getElementById("employeeDropdown");
    const employeeHiddenInput = document.getElementById("taskAssignedTo");
    const employeeChip        = document.getElementById("employeeChip");
    const chipAvatar          = document.getElementById("chipAvatar");
    const chipName            = document.getElementById("chipName");
    const chipRemove          = document.getElementById("chipRemove");

    function initials(name) {
        return name
            .split(" ")
            .filter(Boolean)
            .slice(0, 2)
            .map(w => w[0].toUpperCase())
            .join("");
    }

    function renderEmployeeDropdown(list) {
        employeeDropdown.innerHTML = "";

        if (list.length === 0) {
            const empty = document.createElement("div");
            empty.className = "employee-option empty";
            empty.textContent = "No matches found";
            employeeDropdown.appendChild(empty);
            return;
        }

        list.forEach(emp => {
            const opt = document.createElement("div");
            opt.className = "employee-option";
            opt.innerHTML = `
                <span class="option-avatar">${initials(emp.full_name)}</span>
                <span>${emp.full_name}</span>
                <span class="option-id">ID ${emp.id}</span>
            `;
            // mousedown (not click) fires before the input can blur/re-trigger focus logic,
            // and preventDefault stops the input from losing focus mid-selection.
            opt.addEventListener("mousedown", (e) => {
                e.preventDefault();
                selectEmployee(emp);
            });
            employeeDropdown.appendChild(opt);
        });
    }

    function openEmployeeDropdown() {
        const term = employeeSearchInput.value.trim().toLowerCase();
        const filtered = term
            ? allEmployees.filter(emp => emp.full_name.toLowerCase().includes(term))
            : allEmployees;
        renderEmployeeDropdown(filtered);
        employeeDropdown.classList.add("show");
    }

    function closeEmployeeDropdown() {
        employeeDropdown.classList.remove("show");
    }

    function selectEmployee(emp) {
        employeeHiddenInput.value = emp.id;

        // Lock in the selection: hide the search field entirely and show a chip instead.
        // This is what guarantees the dropdown can't linger or reopen after a pick.
        chipAvatar.textContent = initials(emp.full_name);
        chipName.textContent   = emp.full_name;
        employeeChip.style.display = "flex";
        employeeInputShell.style.display = "none";

        closeEmployeeDropdown();
        employeeSearchInput.value = "";
    }

    function clearEmployeeSelection() {
        employeeHiddenInput.value = "";
        employeeChip.style.display = "none";
        employeeInputShell.style.display = "flex";
        employeeSearchInput.value = "";
        employeeSearchInput.focus();
    }

    employeeSearchInput.addEventListener("input", openEmployeeDropdown);
    employeeSearchInput.addEventListener("focus", openEmployeeDropdown);
    chipRemove.addEventListener("click", clearEmployeeSelection);

    document.addEventListener("click", (e) => {
        if (!document.getElementById("employeeSelectWrapper").contains(e.target)) {
            closeEmployeeDropdown();
        }
    });

    // ── CREATE TASK ──────────────────────────────────────────
    async function createTask() {
        const title      = document.getElementById("taskTitle").value.trim();
        const desc       = document.getElementById("taskDescription").value.trim();
        const assignedTo = document.getElementById("taskAssignedTo").value;
        const priority   = document.getElementById("taskPriority").value;
        const dueDate    = document.getElementById("taskDueDate").value;
        const status     = document.getElementById("taskStatus").value;
        const assignedBy = localStorage.getItem("userId");

        // Validation
        if (!title)      { showToast("Task title is required.");       return; }
        if (!assignedTo) { showToast("Please select an employee.");     return; }
        if (!dueDate)    { showToast("Please set a due date.");         return; }
        if (!assignedBy) { showToast("Session expired. Please log in again."); return; }

        try {
            const params = new URLSearchParams({
                title:       title,
                description: desc,
                assigned_to: assignedTo,   // user_id from the dropdown value
                assigned_by: assignedBy,   // manager's user_id from localStorage
                priority:    priority,
                status:      status,
                due_date:    dueDate
            });

            const res  = await fetch(`${BASE}/create-task?${params}`, { method: "POST" });
            const data = await res.json();

            if (data.success) {
                alert("Task created successfully.");
                window.location.href = "manager-dashboard.html";
            } else {
                showToast("Failed to create task. Please try again.");
            }

        } catch (e) {
            console.error("createTask error:", e);
            showToast("Network error. Please try again.");
        }
    }

    // Init
    loadEmployees();
</script>


<!-- PWA: installable app support -->
<button id="pwaInstallBtn" onclick="pwaInstallApp()"
        style="display:none;position:fixed;bottom:24px;right:24px;z-index:9998;
               background:#2563eb;color:#fff;border:none;padding:12px 20px;
               border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;
               box-shadow:0 4px 14px rgba(0,0,0,.2);">
    ⬇ Install App
</button>
<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("service-worker.js").catch(err =>
                console.warn("Service worker registration failed:", err)
            );
        });
    }

    let pwaDeferredPrompt = null;
    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        pwaDeferredPrompt = e;
        const btn = document.getElementById("pwaInstallBtn");
        if (btn) btn.style.display = "block";
    });

    function pwaInstallApp() {
        const btn = document.getElementById("pwaInstallBtn");
        if (!pwaDeferredPrompt) return;
        pwaDeferredPrompt.prompt();
        pwaDeferredPrompt.userChoice.finally(() => {
            pwaDeferredPrompt = null;
            if (btn) btn.style.display = "none";
        });
    }

    window.addEventListener("appinstalled", () => {
        const btn = document.getElementById("pwaInstallBtn");
        if (btn) btn.style.display = "none";
    });
</script>

</body>
</html>
