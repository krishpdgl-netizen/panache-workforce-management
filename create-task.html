<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task | Panache</title>
    <script>
        const role = localStorage.getItem("userRole");
        if (!role) { window.location.href = "index.html"; }
        if (role !== "manager") { window.location.href = "index.html"; }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #2563eb;
        }

        .menu details summary {
            color: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            list-style: none;
        }

        .menu details summary:hover {
            background: #2563eb;
        }

        .menu details a {
            padding-left: 24px;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            width: 100%;
            padding: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 { color: #111827; }

        .profile {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn:hover { background: #b91c1c; }

        /* FORM CARD */
        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            max-width: 750px;
        }

        .section h2 {
            margin-bottom: 25px;
            color: #111827;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
            color: #111827;
            background: #fff;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* BUTTONS */
        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 13px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
        }

        .submit-btn:hover { background: #1d4ed8; }

        .cancel-btn {
            background: #e5e7eb;
            color: #374151;
            padding: 13px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-right: 12px;
        }

        .cancel-btn:hover { background: #d1d5db; }

        /* AI PREVIEW */
        .ai-box {
            background: #eef4ff;
            border-left: 5px solid #2563eb;
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
        }

        .ai-box h3 {
            margin-bottom: 12px;
            color: #1d4ed8;
        }

        .ai-box p {
            font-size: 14px;
            color: #374151;
            margin-bottom: 8px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #111827;
            color: white;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .main { margin-left: 200px; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Panache WMS</div>
    <div class="menu">
        <a href="manager-dashboard.html">Dashboard</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>Create New Task</h1>
        <div style="display:flex;align-items:center;gap:15px;">
            <div class="profile">
                <b id="profileName">Loading...</b><br>
                <span id="profileEmail"></span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- FORM -->
    <div class="section">
        <h2>Task Details</h2>

        <div class="form-group">
            <label>Task Title</label>
            <input type="text" id="taskTitle" placeholder="Enter task title">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="taskDescription" placeholder="Describe the task..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Assign To</label>
                <select id="taskAssignedTo">
                    <option value="">Loading employees...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="taskDueDate">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="taskStatus">
                    <option value="Assigned">Assigned</option>
                    <option value="In Progress">In Progress</option>
                </select>
            </div>
        </div>

        <!-- AI RECOMMENDATION -->
        <div class="ai-box" id="aiBox" style="display:none;">
            <h3>AI Recommendation</h3>
            <p id="aiWorkload">—</p>
            <p id="aiSuggestion">—</p>
        </div>

        <div style="margin-top: 25px;">
            <button class="cancel-btn" onclick="window.location.href='manager-dashboard.html'">
                Cancel
            </button>
            <button class="submit-btn" onclick="createTask()">
                Create Task
            </button>
        </div>
    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    const BASE = "https://backend-n5lk.onrender.com";

    document.getElementById("profileName").innerHTML  = localStorage.getItem("userName");
    document.getElementById("profileEmail").innerHTML = localStorage.getItem("userEmail");

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }

    // ── LOAD TEAM MEMBERS INTO DROPDOWN ─────────────────────
    async function loadEmployees() {
        const managerId = localStorage.getItem("userId");
        if (!managerId) { showToast("Session expired. Please log in again."); return; }

        try {
            const res     = await fetch(`${BASE}/team?manager_id=${managerId}`);
            const members = await res.json();
            const select  = document.getElementById("taskAssignedTo");

            if (!Array.isArray(members) || members.length === 0) {
                select.innerHTML = '<option value="">No team members found</option>';
                showToast("No team members assigned to you yet.");
                return;
            }

            select.innerHTML = '<option value="">Select team member...</option>';

            members.forEach(emp => {
                const opt       = document.createElement("option");
                opt.value       = emp.id;
                opt.textContent = `${emp.full_name} (ID: ${emp.id})`;
                select.appendChild(opt);
            });

            // Show AI box once team is loaded
            showAIRecommendation(members);

        } catch (e) {
            console.error("loadEmployees error:", e);
            showToast("Could not load team members. Please refresh.");
        }
    }

    // ── AI RECOMMENDATION (lightweight) ──────────────────────
    async function showAIRecommendation(employees) {
        try {
            const res  = await fetch(`${BASE}/employee-performance`);
            const perf = await res.json();

            if (!perf.length) return;

            // Find employee with lowest assigned tasks (least loaded)
            perf.sort((a, b) => a.assigned - b.assigned);
            const recommended = perf[0];

            document.getElementById("aiWorkload").textContent =
                "Employee workload analyzed. Least loaded team member identified.";

            document.getElementById("aiSuggestion").innerHTML =
                `Recommended assignee: <b>${recommended.name}</b> — `
                + `${recommended.assigned} tasks assigned, ${recommended.score}% productivity score.`;

            document.getElementById("aiBox").style.display = "block";

        } catch (e) {
            // AI box is optional — silently skip if endpoint fails
        }
    }

    // ── CREATE TASK ──────────────────────────────────────────
    async function createTask() {
        const title      = document.getElementById("taskTitle").value.trim();
        const desc       = document.getElementById("taskDescription").value.trim();
        const assignedTo = document.getElementById("taskAssignedTo").value;
        const priority   = document.getElementById("taskPriority").value;
        const dueDate    = document.getElementById("taskDueDate").value;
        const status     = document.getElementById("taskStatus").value;
        const assignedBy = localStorage.getItem("userId");

        // Validation
        if (!title)      { showToast("Task title is required.");       return; }
        if (!assignedTo) { showToast("Please select an employee.");     return; }
        if (!dueDate)    { showToast("Please set a due date.");         return; }
        if (!assignedBy) { showToast("Session expired. Please log in again."); return; }

        try {
            const params = new URLSearchParams({
                title:       title,
                description: desc,
                assigned_to: assignedTo,   // user_id from the dropdown value
                assigned_by: assignedBy,   // manager's user_id from localStorage
                priority:    priority,
                status:      status,
                due_date:    dueDate
            });

            const res  = await fetch(`${BASE}/create-task?${params}`, { method: "POST" });
            const data = await res.json();

            if (data.success) {
                alert("Task created successfully.");
                window.location.href = "manager-dashboard.html";
            } else {
                showToast("Failed to create task. Please try again.");
            }

        } catch (e) {
            console.error("createTask error:", e);
            showToast("Network error. Please try again.");
        }
    }

    // Init
    loadEmployees();
</script>


<!-- PWA: installable app support -->
<button id="pwaInstallBtn" onclick="pwaInstallApp()"
        style="display:none;position:fixed;bottom:24px;right:24px;z-index:9998;
               background:#2563eb;color:#fff;border:none;padding:12px 20px;
               border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;
               box-shadow:0 4px 14px rgba(0,0,0,.2);">
    ⬇ Install App
</button>
<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("service-worker.js").catch(err =>
                console.warn("Service worker registration failed:", err)
            );
        });
    }

    let pwaDeferredPrompt = null;
    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        pwaDeferredPrompt = e;
        const btn = document.getElementById("pwaInstallBtn");
        if (btn) btn.style.display = "block";
    });

    function pwaInstallApp() {
        const btn = document.getElementById("pwaInstallBtn");
        if (!pwaDeferredPrompt) return;
        pwaDeferredPrompt.prompt();
        pwaDeferredPrompt.userChoice.finally(() => {
            pwaDeferredPrompt = null;
            if (btn) btn.style.display = "none";
        });
    }

    window.addEventListener("appinstalled", () => {
        const btn = document.getElementById("pwaInstallBtn");
        if (btn) btn.style.display = "none";
    });
</script>

</body>
</html>
