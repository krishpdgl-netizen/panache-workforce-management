<!DOCTYPE html>
<html lang="en">
<head>
<script> const role = localStorage.getItem("userRole"); if(!role){ window.location.href = "index.html"; } </script>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Task | Panache</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 15px rgba(0,0,0,.08);
}

h1{
margin-bottom:25px;
color:#111827;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

textarea{
height:120px;
resize:none;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

button{
background:#2563eb;
color:white;
padding:14px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.preview{
margin-top:30px;
background:#eef4ff;
padding:20px;
border-radius:10px;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
color:white;
font-size:12px;
}

.high{
background:#f59e0b;
}

.critical{
background:#ef4444;
}

.medium{
background:#10b981;
}

</style>
</head>

<body>

<div class="container">

<h1>Create New Task</h1>

<form>

<div class="form-group">
<label>Task Title</label>
<input type="text" placeholder="Enter task title">
</div>

<div class="form-group">
<label>Description</label>
<textarea placeholder="Task description"></textarea>
</div>

<div class="row">

<div class="form-group">
<label>Assign To</label>
<select>
<option>Amit Sharma</option>
<option>Priya Verma</option>
<option>Rahul Singh</option>
<option>Neha Gupta</option>
</select>
</div>

<div class="form-group">
<label>Priority</label>
<select>
<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Critical</option>
</select>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Start Date</label>
<input type="date">
</div>

<div class="form-group">
<label>Due Date</label>
<input type="date">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Status</label>
<select>
<option>Todo</option>
<option>In Progress</option>
<option>Review</option>
<option>Completed</option>
</select>
</div>

<div class="form-group">
<label>Department</label>
<select>
<option>Development</option>
<option>Marketing</option>
<option>Sales</option>
<option>Operations</option>
</select>
</div>

</div>

<div class="form-group">
<label>Estimated Hours</label>
<input type="number" placeholder="Enter estimated effort">
</div>

<button type="submit">
Create Task
</button>

</form>

<div class="preview">

<h3>AI Recommendation</h3>

<br>

<p>
Employee workload is currently balanced.
Recommended assignee: <b>Amit Sharma</b>
</p>

<br>

<p>
Suggested priority:
<span class="badge high">HIGH</span>
</p>

<br>

<p>
Expected completion probability:
<b>92%</b>
</p>

</div>

</div>

</body>
</html>
