<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
    padding:20px;
}

.page-header{
    margin-bottom:20px;
}

.page-header h1{
    color:#222;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:white;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.tab-btn.active{
    background:#2563eb;
    color:white;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

.card h2{
    margin-bottom:15px;
}

.primary-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

.primary-btn:hover{
    opacity:.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#f0f4f8;
    padding:12px;
    text-align:left;
}

table td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.status{
    padding:5px 10px;
    border-radius:15px;
    font-size:12px;
    font-weight:bold;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.approved{
    background:#d4edda;
    color:#155724;
}

.rejected{
    background:#f8d7da;
    color:#721c24;
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:25px;
    width:500px;
    max-width:95%;
    border-radius:12px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.secondary-btn{
    background:#ddd;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="page-header">
    <h1>Employee Hub</h1>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('leave')">Leave</button>
    <button class="tab-btn" onclick="showTab('requests')">Requests</button>
    <button class="tab-btn" onclick="showTab('announcements')">Announcements</button>
    <button class="tab-btn" onclick="showTab('documents')">Documents</button>
</div>

<!-- LEAVE TAB -->

<div id="leave" class="tab-content active">

    <div class="card">

        <h2>Leave Management</h2>

        <button class="primary-btn" onclick="openLeaveModal()">
            Apply Leave
        </button>

    </div>

    <div class="card">

        <h2>My Leave Requests</h2>

        <table>

            <thead>
                <tr>
                    <th>Type</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="leaveTable">

                <tr>
                    <td>Casual Leave</td>
                    <td>01-Jul-2026</td>
                    <td>02-Jul-2026</td>
                    <td>
                        <span class="status pending">
                            Pending
                        </span>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- REQUESTS -->

<div id="requests" class="tab-content">

    <div class="card">

        <h2>Employee Requests</h2>

        <p>Coming Soon</p>

    </div>

</div>

<!-- ANNOUNCEMENTS -->

<div id="announcements" class="tab-content">

    <div class="card">

        <h2>Company Announcements</h2>

        <p>No announcements yet.</p>

    </div>

</div>

<!-- DOCUMENTS -->

<div id="documents" class="tab-content">

    <div class="card">

        <h2>Documents</h2>

        <p>Coming Soon</p>

    </div>

</div>

<!-- LEAVE MODAL -->

<div class="modal" id="leaveModal">

    <div class="modal-content">

        <h2 style="margin-bottom:20px;">
            Apply Leave
        </h2>

        <div class="form-group">

            <label>Leave Type</label>

            <select id="leaveType">

                <option>Casual Leave</option>
                <option>Sick Leave</option>
                <option>Work From Home</option>
                <option>Half Day</option>

            </select>

        </div>

        <div class="form-group">

            <label>Start Date</label>

            <input type="date" id="startDate">

        </div>

        <div class="form-group">

            <label>End Date</label>

            <input type="date" id="endDate">

        </div>

        <div class="form-group">

            <label>Reason</label>

            <textarea id="reason" rows="4"></textarea>

        </div>

        <div class="modal-actions">

            <button
                class="secondary-btn"
                onclick="closeLeaveModal()">
                Cancel
            </button>

            <button
                class="primary-btn"
                onclick="submitLeave()">
                Submit
            </button>

        </div>

    </div>

</div>

<script>

function showTab(tabId){

    document.querySelectorAll('.tab-content')
        .forEach(tab => tab.classList.remove('active'));

    document.querySelectorAll('.tab-btn')
        .forEach(btn => btn.classList.remove('active'));

    document.getElementById(tabId)
        .classList.add('active');

    event.target.classList.add('active');
}

function openLeaveModal(){

    document.getElementById('leaveModal')
        .style.display = 'flex';
}

function closeLeaveModal(){

    document.getElementById('leaveModal')
        .style.display = 'none';
}

async function submitLeave(){

    const leaveData = {

        leave_type:
            document.getElementById('leaveType').value,

        start_date:
            document.getElementById('startDate').value,

        end_date:
            document.getElementById('endDate').value,

        reason:
            document.getElementById('reason').value

    };

    console.log(leaveData);

    // Backend API call will go here later

    alert("Leave Request Submitted");

    closeLeaveModal();
}

</script>

</body>
</html>
