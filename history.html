<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task History | Panache</title>
    <script>
        const role = localStorage.getItem("userRole");
        if (!role) { window.location.href = "index.html"; }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #111827;
            color: white;
            padding: 20px;
            position: fixed;
            left: 0;
            top: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover { background: #2563eb; }
        .menu a.active { background: #2563eb; }

        /* MAIN */
        .main {
            margin-left: 250px;
            padding: 25px;
            width: calc(100% - 250px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 { color: #111827; }

        .profile {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .logout-btn {
            background: #dc2626;
            padding: 10px 18px;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn:hover { background: #b91c1c; }

        /* CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        .card h2 {
            color: #2563eb;
            margin-bottom: 6px;
            font-size: 28px;
        }

        .card p { color: #6b7280; font-size: 14px; }

        /* SECTION */
        .section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        .section h2 { margin-bottom: 20px; color: #111827; }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #f3f4f6;
            font-size: 13px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        tr:hover td { background: #f9fafb; }

        /* BADGE */
        .badge-completed {
            display: inline-block;
            background: #dcfce7;
            color: #15803d;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #9ca3af;
            font-size: 14px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #111827;
            color: white;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 9999;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .main { margin-left: 200px; width: calc(100% - 200px); }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Panache WMS</div>
    <div class="menu">
        <a href="employee-dashboard.html">Dashboard</a>
        <a href="settings.html">Settings</a>
        <a href="history.html" class="active">History</a>
    </div>
<!-- ── PERSONAL TO-DO ─────────────────────────────── -->
<div style="margin-top:auto;padding-top:20px;border-top:0.5px solid rgba(255,255,255,0.12);">
    <p style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:10px;">My notes</p>

    <div id="sidebarTodos" style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;"></div>

    <div style="display:flex;gap:6px;margin-top:10px;">
        <input id="sidebarTodoInput"
               placeholder="Add a task..."
               style="flex:1;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 8px;font-size:12px;color:#fff;outline:none;"
               onkeydown="if(event.key==='Enter')addSidebarTodo()" />
        <button onclick="addSidebarTodo()"
                style="width:28px;height:28px;border-radius:6px;background:#2563eb;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;flex-shrink:0;">+</button>
    </div>
</div>
</div>
<script>
(function() {
    const KEY = "panache_todos";

    function load() {
        try { return JSON.parse(localStorage.getItem(KEY)) || []; }
        catch { return []; }
    }

    function save(todos) {
        localStorage.setItem(KEY, JSON.stringify(todos));
    }

    function render() {
        const todos = load();
        const box   = document.getElementById("sidebarTodos");
        box.innerHTML = "";

        todos.forEach((text, i) => {
            const row = document.createElement("div");
            row.style.cssText = "display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.8);line-height:1.4;";
            row.innerHTML = `
                <div onclick="completeSidebarTodo(${i})"
                     title="Mark complete — will be removed"
                     style="width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;"></div>
                <span>${text}</span>`;
            box.appendChild(row);
        });
    }

    window.addSidebarTodo = function() {
        const inp  = document.getElementById("sidebarTodoInput");
        const text = inp.value.trim();
        if (!text) return;
        const todos = load();
        todos.push(text);
        save(todos);
        inp.value = "";
        render();
    };

    window.completeSidebarTodo = function(i) {
        const circle = document.getElementById("sidebarTodos")
                               .children[i]
                               .querySelector("div");
        circle.style.background    = "#22c55e";
        circle.style.borderColor   = "#22c55e";
        circle.innerHTML           = `<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        setTimeout(() => {
            const todos = load();
            todos.splice(i, 1);
            save(todos);
            render();
        }, 500);
    };

    render();
})();
</script>
<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>Task History</h1>
        <div style="display:flex;align-items:center;gap:15px;">
            <div class="profile">
                <b id="profileName">Loading...</b><br>
                <span id="profileEmail"></span><br>
                <span id="profileId"></span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="cards">
        <div class="card">
            <h2 id="cardTotal">—</h2>
            <p>Tasks Completed</p>
        </div>
        <div class="card">
            <h2 id="cardLatest">—</h2>
            <p>Most Recent</p>
        </div>
    </div>

    <!-- HISTORY TABLE -->
    <div class="section">
        <h2>Completed Tasks Log</h2>
        <table>
            <thead>
                <tr>
                    <th>History ID</th>
                    <th>Task ID</th>
                    <th>Task Title</th>
                    <th>Completed At</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <tr><td colspan="5" class="no-data">Loading history...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    const BASE   = "https://backend-production-53f3.up.railway.app";
    const userId = localStorage.getItem("userId");

    // ── PROFILE ──────────────────────────────────────────────
    document.getElementById("profileName").innerHTML  = localStorage.getItem("userName");
    document.getElementById("profileEmail").innerHTML = localStorage.getItem("userEmail");
    document.getElementById("profileId").innerHTML    = "Employee ID: " + userId;

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }

function formatDate(raw) {

    console.log("RAW =", raw);

    if (!raw) return "—";

    const d = new Date(raw);

    console.log("DATE =", d);

    if (isNaN(d)) return raw;

    return d.toLocaleString("en-IN", {
        timeZone: "Asia/Kolkata",
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
    });

}

    // ── LOAD HISTORY ─────────────────────────────────────────
    async function loadHistory() {
        try {
            const res     = await fetch(`${BASE}/history?user_id=${userId}`);
            const history = await res.json();

            if (!history.length) {
                document.getElementById("historyTable").innerHTML =
                    `<tr><td colspan="5" class="no-data">No completed tasks yet.</td></tr>`;
                document.getElementById("cardTotal").innerHTML  = "0";
                document.getElementById("cardLatest").innerHTML = "—";
                return;
            }

            // Summary cards
            document.getElementById("cardTotal").innerHTML = history.length;
            document.getElementById("cardLatest").innerHTML =
                history[0].task_title
                    ? history[0].task_title.length > 16
                        ? history[0].task_title.slice(0, 14) + "…"
                        : history[0].task_title
                    : "—";

            // Table rows
            let html = "";
            history.forEach(item => {
                html += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.task_id}</td>
                        <td><b>${item.task_title || "—"}</b></td>
                        <td>${formatDate(item.submitted_at || item.completed_at)}</td>
                        <td><span class="badge-completed">Completed</span></td>
                    </tr>`;
            });

            document.getElementById("historyTable").innerHTML = html;

        } catch (e) {
            console.error("loadHistory error:", e);
            document.getElementById("historyTable").innerHTML =
                `<tr><td colspan="5" class="no-data" style="color:#dc2626;">
                    Failed to load history. Please refresh.
                </td></tr>`;
            showToast("Could not load task history.");
        }
    }

    loadHistory();
</script>

</body>
</html>
