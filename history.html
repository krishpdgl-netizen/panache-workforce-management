<!DOCTYPE html>
<html lang="en">

<head>

<script>

const role = localStorage.getItem("userRole");

if(!role){
    window.location.href="index.html";
}

</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task History | Panache</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#111827;
color:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header button{
background:#dc2626;
border:none;
color:white;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:15px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f3f4f6;
}

</style>

</head>

<body>

<div class="header">

<h1>Task History</h1>

<div>

<span id="userName"></span>

<button onclick="logout()">
Logout
</button>

</div>

</div>

<div class="container">

<div class="card">

<h2>Completed Tasks Log</h2>

<table>

<tr>

<th>History ID</th>

<th>Task ID</th>

<th>Task Title</th>

<th>Submitted At</th>

</tr>

<tbody id="historyTable">

</tbody>

</table>

</div>

</div>

<script>

document.getElementById("userName").innerHTML =
localStorage.getItem("userName");

function logout(){

    localStorage.clear();

    window.location.href="index.html";

}

async function loadHistory(){

    const userId =
    localStorage.getItem("userId");

    const response = await fetch(
    `https://backend-production-53f3.up.railway.app/history?user_id=${userId}`
    );

    const history = await response.json();

    let html = "";

    history.forEach(item=>{

        html += `
        <tr>

        <td>${item.id}</td>

        <td>${item.task_id}</td>

        <td>${item.task_title}</td>

        <td>${item.submitted_at}</td>

        </tr>
        `;

    });

    document.getElementById("historyTable").innerHTML =
    html;

}

loadHistory();

</script>

</body>

</html>
