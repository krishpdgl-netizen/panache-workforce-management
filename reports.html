<!DOCTYPE html>
<html lang="en">
<head>
        <link rel="icon" type="image/png" href="static/favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Panache</title>
    <script>
        const role = localStorage.getItem("userRole");
        if (!role) { window.location.href = "index.html"; }
        if (role !== "manager") { window.location.href = "index.html"; }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover, .menu a.active {
            background: #2563eb;
        }

        .menu details summary {
            color: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            list-style: none;
        }

        .menu details summary:hover {
            background: #2563eb;
        }

        .menu details a {
            padding-left: 24px;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            width: 100%;
            padding: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #111827;
        }

        .profile {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn:hover { background: #b91c1c; }

        /* CARDS */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        .card h2 {
            color: #2563eb;
            font-size: 32px;
            margin-bottom: 6px;
        }

        .card p {
            color: #6b7280;
            font-size: 14px;
        }

        .card.green h2  { color: #16a34a; }
        .card.yellow h2 { color: #f59e0b; }
        .card.red h2    { color: #dc2626; }

        /* SECTION */
        .section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        .section h2 {
            margin-bottom: 20px;
            color: #111827;
        }

        /* PRODUCTIVITY BAR */
        .productivity-bar-wrap {
            margin-bottom: 20px;
        }

        .productivity-bar-wrap .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
            color: #374151;
        }

        .bar-track {
            background: #e5e7eb;
            border-radius: 99px;
            height: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            background: #2563eb;
            transition: width 0.8s ease;
        }

        .bar-fill.green  { background: #16a34a; }
        .bar-fill.yellow { background: #f59e0b; }
        .bar-fill.red    { background: #dc2626; }

        /* STATUS BREAKDOWN */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 10px;
        }

        .status-pill {
            border-radius: 12px;
            padding: 18px;
            text-align: center;
        }

        .status-pill h3 {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .status-pill p {
            font-size: 13px;
        }

        .pill-blue   { background: #eff6ff; color: #1d4ed8; }
        .pill-yellow { background: #fffbeb; color: #b45309; }
        .pill-orange { background: #fff7ed; color: #c2410c; }
        .pill-green  { background: #f0fdf4; color: #15803d; }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #f3f4f6;
            font-size: 13px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        td { font-size: 14px; color: #111827; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-green  { background: #dcfce7; color: #15803d; }
        .badge-yellow { background: #fef9c3; color: #a16207; }
        .badge-blue   { background: #dbeafe; color: #1d4ed8; }
        .badge-red    { background: #fee2e2; color: #b91c1c; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .main { margin-left: 200px; }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Panache WMS</div>
    <div class="menu">
        <a href="manager-dashboard.html">Dashboard</a>
        <a href="team-members.html">Team Members</a>
        <a href="reports.html" class="active">Reports</a>
        <a href="settings.html">Settings</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>Reports</h1>
        <div style="display:flex;align-items:center;gap:15px;">
            <div class="profile">
                <b id="profileName">Loading...</b><br>
                <span id="profileEmail"></span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="cards">
        <div class="card">
            <h2 id="statEmployees">—</h2>
            <p>Team members</p>
        </div>
        <div class="card">
            <h2 id="statTotal">—</h2>
            <p>Assigned Tasks</p>
        </div>
        <div class="card green">
            <h2 id="statCompleted">—</h2>
            <p>Completed Tasks</p>
        </div>
        <div class="card yellow">
            <h2 id="statPending">—</h2>
            <p>Pending Tasks</p>
        </div>
        <div class="card">
            <h2 id="statProductivity">—</h2>
            <p>Completion Rate</p>
        </div>
    </div>

    <!-- TEAM PRODUCTIVITY -->
    <div class="section">
        <h2>Team Productivity</h2>
        <div id="productivityBars">
            <p style="color:#9ca3af;font-size:14px;">Loading...</p>
        </div>
    </div>

   

<script>
    const BASE = "https://backend-production-53f3.up.railway.app";

    document.getElementById("profileName").innerHTML  = localStorage.getItem("userName");
    document.getElementById("profileEmail").innerHTML = localStorage.getItem("userEmail");

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    function barColor(score) {
        if (score >= 75) return "green";
        if (score >= 40) return "";
        return "red";
    }

    function ratingBadge(score) {
        if (score >= 75) return `<span class="badge badge-green">High</span>`;
        if (score >= 40) return `<span class="badge badge-yellow">Medium</span>`;
        return `<span class="badge badge-red">Low</span>`;
    }

    // ── MANAGER STATS ────────────────────────────────────────
    async function loadStats(){

    const managerId =
    localStorage.getItem("userId");

    const response =
    await fetch(
    `${BASE}/manager-report?manager_id=${managerId}`
    );

    const data =
    await response.json();

    document.getElementById("statEmployees").innerHTML =
    data.team_members;

    document.getElementById("statTotal").innerHTML =
    data.assigned_tasks;

    document.getElementById("statCompleted").innerHTML =
    data.completed_tasks;

    document.getElementById("statPending").innerHTML =
    data.pending_tasks;

    document.getElementById("statProductivity").innerHTML =
    data.completion_rate + "%";

}

    // ── REVIEW TASKS COUNT ───────────────────────────────────
    async function loadReviewCount() {
        try {
            const res   = await fetch(`${BASE}/review-tasks`);
            const tasks = await res.json();
            document.getElementById("bReview").innerHTML = tasks.length;
        } catch (e) {
            document.getElementById("bReview").innerHTML = "—";
        }
    }

    // ── EMPLOYEE PERFORMANCE ─────────────────────────────────
    async function loadPerformance() {
        try {
            const res  = await fetch(`${BASE}/employee-performance`);
            const data = await res.json();

            // Productivity bars
            let barsHtml = "";
            data.forEach(emp => {
                const color = barColor(emp.score);
                barsHtml += `
                    <div class="productivity-bar-wrap">
                        <div class="bar-label">
                            <span>${emp.name}</span>
                            <span>${emp.score}%</span>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill ${color}" style="width:${emp.score}%"></div>
                        </div>
                    </div>`;
            });
            document.getElementById("productivityBars").innerHTML =
                barsHtml || '<p style="color:#9ca3af;font-size:14px;">No data available.</p>';

            // Employee summary table
            let tableHtml = "";
            data.forEach(emp => {
                tableHtml += `
                    <tr>
                        <td><b>${emp.name}</b></td>
                        <td>${emp.assigned}</td>
                        <td>${emp.completed}</td>
                        <td>${emp.score}%</td>
                        <td>${ratingBadge(emp.score)}</td>
                    </tr>`;
            });
            document.getElementById("employeeSummaryTable").innerHTML =
                tableHtml || `<tr><td colspan="5" style="color:#9ca3af;text-align:center;padding:20px;">No employees found.</td></tr>`;

        } catch (e) {
            console.error("loadPerformance error:", e);
        }
    }

    // Init
    loadStats();
    loadReviewCount();
    loadPerformance();
</script>

</body>
</html>
